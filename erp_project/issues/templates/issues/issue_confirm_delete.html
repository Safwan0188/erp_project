{% extends "issues/base.html" %}

{% block content %}
<div class="delete-confirm-wrapper">
    <div class="delete-confirm-card">
        <div class="delete-icon">
            <i class="bi bi-trash3"></i>
        </div>
        <h4>Delete this issue?</h4>
        <p class="delete-subtext">This action is permanent and cannot be undone.</p>

        <div class="issue-ref">
            <span class="issue-id">#{{ issue.issue_id }}</span>
            <span class="issue-project">{{ issue.project }}</span>
            — {{ issue.task_name }}
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="btn-row">
                <button type="submit" class="btn" style="background:#bf2600;">
                    <i class="bi bi-trash3"></i> Yes, Delete
                </button>
                <a href="{% url 'issue_detail' issue.issue_id %}" class="btn-outline">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
