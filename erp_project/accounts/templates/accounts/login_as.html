{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Dev ERP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="d-flex align-items-center justify-content-center" style="min-height:100vh; background:#f4f6f9;">

    <div class="card shadow-sm" style="width: 100%; max-width: 380px;">
        <div class="card-body p-4">
            <h5 class="card-title mb-1">Dev ERP</h5>
            <p class="text-muted small mb-4">
                Temporary sign-in — pick a user to continue.
            </p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger py-2 small">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small">Log in as</label>
                    <select name="app_user_id" class="form-select" required>
                        <option value="" selected disabled>Select a user...</option>
                        {% for user in app_users %}
                        <option value="{{ user.pk }}">{{ user.name }} ({{ user.get_role_display }})</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100">Continue</button>
            </form>
        </div>
    </div>

</body>

</html>
